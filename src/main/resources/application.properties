spring.application.name=sistema-flashcards
server.port=8080

# H2 (banco em memória)
spring.datasource.url=jdbc:h2:mem:flashcardsdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Console H2 (acessar em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson: datas como ISO-8601 (Jackson 3.x serializa como ISO-8601 por padrão)
